name: Digest

on:
  schedule:
    # Fallback only — the Cloudflare Worker cron (hourly) is the primary
    # trigger via workflow_dispatch, because GitHub's scheduler silently
    # drops slots. Every 2h at :37 + the 2h catch-up in digest.py still
    # covers every scheduled hour if the Worker cron ever fails.
    - cron: "37 */2 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Run for all configured users right now"
        type: boolean
        default: false
      only_user:
        description: "Run immediately for this chat id only (testing)"
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
          TWITTER_USERNAME: ${{ secrets.TWITTER_USERNAME }}
          ADMIN_ID: ${{ vars.ADMIN_ID }}
          FORCE_ALL: ${{ inputs.force == true && '1' || '' }}
          FORCE_USER: ${{ inputs.only_user }}
          DEFAULT_TZ: ${{ vars.DEFAULT_TZ || 'Europe/Kyiv' }}
        run: python -m pipeline.digest

      - name: Save state
        run: |
          git config user.name "digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet && exit 0
          git commit -m "state: digest run"
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase
          done
          git push
