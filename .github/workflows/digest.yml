name: Digest

on:
  schedule:
    # Fallback only — the Cloudflare Worker cron (hourly) is the primary
    # trigger via workflow_dispatch, because GitHub's scheduler silently
    # drops slots. Every 2h at :37 + the 2h catch-up in digest.py still
    # covers every scheduled hour if the Worker cron ever fails.
    - cron: "37 */2 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Run for all configured users right now"
        type: boolean
        default: false
      only_user:
        description: "Run immediately for this chat id only (testing)"
        type: string
        default: ""
      thread_url:
        description: "Build one Thread-post Preview from this X link (target chat id via only_user)"
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # ubuntu-latest no longer ships ffmpeg; media.py needs ffprobe for
      # video width/height/duration and ffmpeg to compress >48 MB videos.
      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends ffmpeg

      - name: Run digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
          TWITTER_USERNAME: ${{ secrets.TWITTER_USERNAME }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          ADMIN_ID: ${{ vars.ADMIN_ID }}
          FORCE_ALL: ${{ inputs.force == true && '1' || '' }}
          FORCE_USER: ${{ inputs.only_user }}
          THREAD_URL: ${{ inputs.thread_url }}
          DEFAULT_TZ: ${{ vars.DEFAULT_TZ || 'Europe/Kyiv' }}
        run: python -m pipeline.digest
