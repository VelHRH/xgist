name: Digest

on:
  schedule:
    - cron: "0 * * * *"   # every hour; digest.py decides which users are due
  workflow_dispatch:
    inputs:
      force:
        description: "Run for all configured users right now"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Write X cookies
        env:
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
        run: printf '%s' "$TWITTER_COOKIES" > cookies.txt

      - name: Run digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_ALL: ${{ inputs.force == true && '1' || '' }}
          DEFAULT_TZ: ${{ vars.DEFAULT_TZ || 'Europe/Kyiv' }}
        run: python -m pipeline.digest

      - name: Save state
        run: |
          git config user.name "digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet && exit 0
          git commit -m "state: digest run"
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase
          done
          git push
